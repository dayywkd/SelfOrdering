<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nine Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/user.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        espresso: '#3B1F0E',
                        mocha:    '#6B3A2A',
                        caramel:  '#C07D4A',
                        latte:    '#E8D5B7',
                        cream:    '#F5EFE6',
                        parchment:'#FBF8F4',
                        leaf:     '#2D6A4F',
                        sage:     '#52B788',
                        mint:     '#D8F3DC',
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body:    ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>

<div class="phone-shell" id="app">
  <!-- PAGE 1 : MENU -->
  <div class="page on-screen" id="page-menu" style="min-height:100dvh; overflow-y:auto; padding-bottom:110px;">
    <div class="coffee-ring" style="top:-60px;right:-50px;"></div>
    <header class="sticky top-0 z-30 px-5 pt-6 pb-4" style="background: rgba(251,248,244,.92); backdrop-filter: blur(12px);">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#3B1F0E;"><span>☕</span></div>
          <div>
            <p class="font-display font-bold leading-none text-espresso text-xl">Nine <span class="text-caramel">Coffee</span></p>
            <p class="text-xs font-body tracking-widest text-mocha mt-1">SPECIALTY CAFÉ</p>
          </div>
        </div>
        <div class="flex items-center gap-2.5">
          <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-latte border border-caramel">
            <span class="text-xs">🪑</span><span class="text-xs font-semibold text-espresso">Meja 12</span>
          </div>
          <button type="button" onclick="toggleSearch()" class="w-9 h-9 rounded-full flex items-center justify-center bg-cream border border-latte" id="searchToggle"><svg width="17" height="17" fill="none" stroke="#6B3A2A" stroke-width="2"><circle cx="7.5" cy="7.5" r="5.5"/><line x1="11.5" y1="11.5" x2="16" y2="16"/></svg></button>
        </div>
      </div>
      <div class="search-panel" id="searchPanel">
        <label class="search-field" for="searchInput">
          <svg width="16" height="16" fill="none" stroke="#C07D4A" stroke-width="2"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
          <input id="searchInput" type="search" placeholder="Cari menu..." oninput="searchMenu(this.value)">
          <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
        </label>
      </div>
    </header>

    <div class="px-5 mt-2 mb-4">
      <div class="flex gap-2.5 overflow-x-auto no-scroll pb-1">
        <button class="cat-btn active rounded-2xl px-4 py-2.5 font-semibold text-sm" onclick="setCategory(this,'semua')">🍽️ Semua</button>
        <button class="cat-btn rounded-2xl px-4 py-2.5 font-semibold text-sm" onclick="setCategory(this,'kopi')">☕ Kopi</button>
        <button class="cat-btn rounded-2xl px-4 py-2.5 font-semibold text-sm" onclick="setCategory(this,'nonkopi')">🍵 Non-Kopi</button>
        <button class="cat-btn rounded-2xl px-4 py-2.5 font-semibold text-sm" onclick="setCategory(this,'makanan')">🥐 Makanan</button>
        <button class="cat-btn rounded-2xl px-4 py-2.5 font-semibold text-sm" onclick="setCategory(this,'camilan')">🍟 Camilan</button>
      </div>
    </div>

    <div class="px-5 flex items-center justify-between mb-3"><h2 class="font-display font-bold text-espresso text-lg" id="sectionLabel">Semua Menu</h2><span class="text-xs font-body text-caramel" id="sectionCount"></span></div>
    <div class="px-4 grid grid-cols-2 gap-3.5" id="menuGrid"></div>
  </div>

  <!-- FLOAT BAR -->
  <div id="floatBar" class="float-bar hidden-bar fixed z-40 px-4 pb-4" style="bottom:0;left:50%;transform:translateX(-50%) translateY(100px);width:100%;max-width:430px;">
    <div class="rounded-2xl flex items-center justify-between px-4 py-3.5 bg-espresso shadow-xl">
      <div class="flex items-center gap-2.5">
        <span>🛒</span>
        <div><p class="text-xs text-caramel" id="floatCount"></p><p class="font-display font-semibold text-parchment" id="floatTotal"></p></div>
      </div>
      <button onclick="goToCart()" class="bg-leaf text-parchment font-semibold text-sm px-5 py-2.5 rounded-xl">Lihat Keranjang →</button>
    </div>
  </div>

  <!-- PAGE 2 : CART -->
  <div class="page off-right" id="page-cart" style="min-height:100dvh; overflow-y:auto; padding-bottom:24px;">
    <header class="sticky top-0 z-30 px-5 pt-6 pb-4 bg-parchment border-b border-latte">
      <div class="flex items-center gap-3">
        <button onclick="goToMenu()" class="w-9 h-9 rounded-full flex items-center justify-center bg-cream border border-latte"><svg width="16" height="16" fill="none" stroke="#3B1F0E" stroke-width="2.2"><polyline points="11 3 5 8 11 13"/></svg></button>
        <div><h1 class="font-display font-bold text-espresso text-lg">Keranjang Belanja</h1><p class="text-xs text-caramel" id="cartSubtitle"></p></div>
      </div>
    </header>
    <section class="px-4 mt-4"><div id="cartList" class="flex flex-col gap-3"></div></section>
    <section class="px-4 mt-5"><div class="rounded-2xl p-4 bg-white border border-latte"><p class="font-semibold text-sm mb-2">Catatan Pesanan</p><textarea id="noteInput" rows="3" placeholder="Contoh: Less sugar..." class="w-full rounded-xl px-3.5 py-2.5 text-sm bg-parchment border border-latte outline-none"></textarea></div></section>
    <section class="px-4 mt-4"><div class="rounded-2xl p-4 bg-white border border-latte"><p class="font-display font-semibold mb-3">Ringkasan</p><div class="flex flex-col gap-2.5 text-sm"><div class="flex justify-between"><span>Subtotal</span><span id="summarySubtotal"></span></div><div class="flex justify-between"><span>Pajak (10%)</span><span id="summaryTax"></span></div><div class="border-t pt-2.5 mt-1 flex justify-between font-bold text-leaf"><span>Total Akhir</span><span id="summaryTotal" class="text-lg"></span></div></div></div></section>
    <section class="px-4 mt-5"><div class="rounded-2xl p-4 bg-white border border-latte"><p class="font-display font-semibold mb-3.5">Metode Pembayaran</p><div class="grid grid-cols-3 gap-3"><button id="pay-tunai" onclick="selectPayment('tunai')" class="pay-method-btn active flex flex-col items-center gap-2 p-3 rounded-xl bg-parchment"><span>💵</span><span class="text-[10px] font-bold uppercase">Tunai</span></button><button id="pay-qris" onclick="selectPayment('qris')" class="pay-method-btn flex flex-col items-center gap-2 p-3 rounded-xl bg-parchment"><span>📱</span><span class="text-[10px] font-bold uppercase">QRIS</span></button><button id="pay-debit" onclick="selectPayment('debit')" class="pay-method-btn flex flex-col items-center gap-2 p-3 rounded-xl bg-parchment"><span>💳</span><span class="text-[10px] font-bold uppercase">Debit</span></button></div><div id="payment-desc" class="mt-4 p-3.5 rounded-xl border border-dashed border-sage bg-mint/50"><p class="text-[11px] text-leaf leading-relaxed"></p></div></div></section>
    <div class="px-4 pt-4 pb-6"><button onclick="pesanSekarang()" class="pesan-btn w-full py-4 rounded-2xl bg-leaf text-parchment font-bold">🛎️ PESAN SEKARANG</button></div>
  </div>

  <!-- SUCCESS OVERLAY -->
  <div id="successOverlay" style="display:none;" class="fixed inset-0 z-[999] bg-espresso/80 flex items-center justify-center p-8">
    <div class="rounded-3xl bg-parchment text-center p-8 w-full max-w-[340px]">
      <div class="text-6xl mb-2">🎉</div>
      <h2 class="font-display font-bold text-espresso text-2xl mb-2">Pesanan Masuk!</h2>
      <p class="text-sm text-mocha mb-6">Silakan tunggu & kasir akan menghampirimu.</p>
      <button onclick="resetApp()" class="w-full py-3 rounded-2xl bg-espresso text-parchment font-bold text-sm">Pesan Lagi ☕</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/data-store.js"></script>
<script src="assets/js/user.js"></script>
</body>
</html>
